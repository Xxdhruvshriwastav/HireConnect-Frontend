<div class="apply-job-wrapper">
  <div class="header">
    <button class="back-btn" (click)="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>Back to Jobs</span>
    </button>
    <h1>Apply for Position #{{ jobId }}</h1>
    <p>Complete the form below to submit your application.</p>
  </div>

  <form [formGroup]="applyForm" (ngSubmit)="onSubmit()" class="apply-form">
    <div class="form-section">
      <div class="input-group">
        <label>Candidate Email</label>
        <input type="email" formControlName="candidateEmail" readonly>
      </div>

      <div class="input-group">
        <label>Resume *</label>
        <div class="upload-row" style="display: flex; gap: 0.5rem; align-items: center;">
          <input type="text" formControlName="resumeUrl" placeholder="Paste link or upload" style="flex: 1;">
          <button type="button" class="btn-upload-small" (click)="fileInput.click()" [disabled]="isUploading" style="padding: 0.5rem 1rem; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer;">
            {{ isUploading ? '...' : 'Upload' }}
          </button>
          <input #fileInput type="file" (change)="onFileSelected($event)" style="display: none;">
        </div>
        <span class="upload-status" style="font-size: 0.75rem; margin-top: 0.25rem; display: block;" *ngIf="uploadMessage">{{ uploadMessage }}</span>
        <span class="error" *ngIf="applyForm.get('resumeUrl')?.touched && applyForm.get('resumeUrl')?.invalid">
          Resume is required.
        </span>
      </div>

      <div class="input-group">
        <label>Cover Letter * (Min 50 characters)</label>
        <textarea formControlName="coverLetter" rows="8" placeholder="Tell the recruiter why you're a great fit..."></textarea>
        <span class="error" *ngIf="applyForm.get('coverLetter')?.touched && applyForm.get('coverLetter')?.invalid">
          Please provide a more detailed cover letter.
        </span>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="goBack()">Discard</button>
      <button type="submit" class="btn-submit" [disabled]="applyForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Submitting...' : 'Submit Application' }}
      </button>
    </div>
  </form>
</div>
